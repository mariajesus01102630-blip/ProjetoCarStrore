<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>carstore</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h3>cadastre seu veiculo para vender mais rapido</h3>
    </header>
    <div>
        <div>
            <p>formulario</p>
        </div>
        <div>
            <h1>venda facil seu carro</h1>
            <p>descreva as caracteristicas dos seu carro e marque os opcionais que ele possui</p>
            <form>
                <div>
                    <label for="title">titulo do anuncio <span>*</span></label>
                    <input type="text" name="title" id="title"plaiceholder="um titulo para anuncio de carro">
                </div>
                <div>
                    <label for="title">preço <span>*</span></label>
                    <input type="text" name="number" id="number"placeholder="defina preço">
                </div>
                <div>
                    <label for="descricao">descricao <span>*</span></label>
                    <textarea name="descricao" id="descricao"placeholder="faça a descricao do seu veiculo"></textarea>
                </div>
                <div>
                    <label for="marca">marca</label> <span>*</span></label>
                    <input type="text" name="marca" id="marca"placeholder="defina a marca do veiculo">
                </div>
                 <div>
                    <label for="modelo">modelo<span>*</span></label>
                    <input type="text" name="modelo" id="modelo"placeholder="defina o modelo do veiculo">
                </div>
                  <div>
                    <label for="kilometragem">kilometragem<span>*</span></label>
                    <input type="number" name="kilometragem" id="kilometragem" placeholder="kilometragem do veiculo">
                </div>
                <div>
                    <label for="data de compra">data de compra<span>*</span></label>
                    <input type="date" name="data de compra" id="data de compra" placeholder="data de compra do carro">
                </div>
                <div>
                    <p>tipo de cambio: <span></span></p>
                    <input type="radio" name="marcha" id="manual">
                    <label for="manual">manual</label>
                     <input type="radio" name="marcha" id="auto">
                     <label for="auto">automatico</label>
                </div>
                <div>
                    <p>opcionais</p>
                <ul>
                    <li><input type="checkbox" name="opicional[]" id="airbag"value= "airbag"></li>
                    <label for="airbag">airbag</label>
                    <li><input type="checkbox" name="opicional[]" id="alarme"value= "alarme"></li>
                    <label for="alarme">alarme</label>
                    <li><input type="checkbox" name="arcomdicionado" id="arcondicionado"value="arcondicionado"></li>
                    <label for="arcondicionado">ar condicionado</label>
                    <li><input type="checkbox" name="camera de ré" id="camera de ré"value= "camera de ré"></li>
                    <label for="cameraderé ">camera de ré</label>
                </ul>
                </div>
                <div>
                <ul>
                    <li><input type="checkbox" name="opicional[]" id="asistentedepista"value= "asistentedepista"></li>
                    <label for="asistentedepista">asistente de pista</label>
                    <li><input type="checkbox" name="opicional[]" id="partidasemchave"value= "partidasemchave"></li>
                    <label for="partidasemchave""partida sem chave</label>
                    <li><input type="checkbox" name="opicional[]" id="celular"value="celular"></li>
                    <label for="celular">celular</label>
                    <li><input type="checkbox" name="opicional[]" id="bancodecouro"value= "bancodecouro"></li>
                    <label for="bancodecouro">banco de couro</label>
                </ul>
                </div>
                <div>
                    <p>fotos do carro</p>
                    <input type="file" name="imagem" id="imagem"multiple accept="image/png, image/jpn">
                </div>
                <input type="submit" value="enviar">
            </form>
            <hr>
            <h2>carros cadastrados </h2>
        </div>
    </div>
    <script src="script/script.js"></script>
</body>
</html>
